<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LinKey</title>
  <style>
    #boot-splash {
      position: fixed;
      z-index: 2147483647;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #252a35;
      background: #f3f3f3;
      opacity: 1;
      will-change: opacity, visibility;
      transition: opacity .28s cubic-bezier(.22, 1, .36, 1), visibility .28s ease;
    }

    #boot-splash.boot-splash--visible {
      display: flex;
    }

    #boot-splash::before {
      position: absolute;
      width: min(88vw, 520px);
      height: min(88vw, 520px);
      border-radius: 50%;
      background: radial-gradient(circle, #b8c9ff66 0%, #9b7dff22 38%, transparent 68%);
      content: "";
      opacity: 0;
      transform: translate(-18%, -24%) scale(.88);
      will-change: transform, opacity;
      transition: transform .9s cubic-bezier(.16, 1, .3, 1), opacity .55s ease;
      pointer-events: none;
    }

    #boot-splash.boot-splash--loading::before {
      opacity: .85;
      transform: translate(-18%, -24%) scale(1);
    }

    #boot-splash.boot-splash--done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      will-change: unset;
    }

    #boot-splash.boot-splash--done::before {
      opacity: 0;
      transform: translate(-18%, -24%) scale(1.14);
      animation: none;
    }

    .boot-splash__content {
      position: relative;
      display: grid;
      justify-items: center;
      width: min(210px, 58vw);
    }

    .boot-splash__mark {
      position: relative;
      display: grid;
      width: 66px;
      height: 66px;
      border-radius: 23px;
      place-items: center;
      color: #fff;
      background:
        linear-gradient(145deg, #6e95ff 0%, #618cff 42%, #8a6dff 100%);
      box-shadow:
        0 0 0 1px #ffffff2e inset,
        0 10px 26px #718cff55,
        0 0 32px #7a8dff33;
      font: 700 22px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 14px;
      padding: 22px 8px 8px 22px;
      transform: scale(.96);
      opacity: .92;
      transition:
        transform .7s cubic-bezier(.16, 1, .3, 1),
        opacity .45s ease,
        box-shadow .5s ease;
    }

    #boot-splash.boot-splash--loading .boot-splash__mark {
      transform: scale(1);
      opacity: 1;
      animation: boot-mark-pulse 2.4s ease-in-out infinite;
    }

    #boot-splash.boot-splash--complete .boot-splash__mark {
      animation: none;
      box-shadow:
        0 0 0 1px #ffffff44 inset,
        0 12px 28px #718cff66,
        0 0 40px #8a6dff55;
    }

    .boot-splash__progress {
      position: absolute;
      z-index: 1;
      inset: -2px;
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      overflow: visible;
      pointer-events: none;
    }

    .boot-splash__progress .progress-mid,
    .boot-splash__progress .progress {
      fill: none;
      stroke-linecap: round;
      stroke-dasharray: 0 100;
      stroke-dashoffset: 0;
      opacity: 0;
    }

    .boot-splash__progress .progress-mid {
      stroke: #4583f6;
      stroke-width: 1.3;
    }

    .boot-splash__progress .progress {
      stroke: #4c89fc;
      stroke-width: 1.85;
    }

    #key rect {
      fill: #ffffffbc !important;
    }

    #boot-splash.boot-splash--loading .boot-splash__progress .progress-mid {
      animation: boot-sweep-fill 3.2s cubic-bezier(.2, .75, .2, 1) forwards;
    }

    #boot-splash.boot-splash--loading .boot-splash__progress .progress {
      animation: boot-sweep-fill 3.2s cubic-bezier(.2, .75, .2, 1) forwards;
    }

    #boot-splash.boot-splash--loading .boot-splash__progress .progress-mid {
      opacity: .68;
    }

    #boot-splash.boot-splash--loading .boot-splash__progress .progress {
      opacity: .16;
    }

    .boot-splash__name {
      padding-top: 30px;
      padding-left: 6px;
      letter-spacing: .18em;
      opacity: 0;
      transform: translateY(6px);
      font: 800 20px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(90deg, #5a6a8a 0%, #6b7cff 45%, #8a6dff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      transition: opacity .95s ease .08s, transform .95s cubic-bezier(.16, 1, .3, 1) .08s, letter-spacing .95s ease .08s;
    }

    #boot-splash.boot-splash--loading .boot-splash__name {
      opacity: .72;
      transform: translateY(0);
    }

    #boot-splash.boot-splash--complete .boot-splash__name {
      opacity: .9;
      letter-spacing: .22em;
    }

    @keyframes boot-ambient-breathe {
      0% {
        transform: translate(-18%, -24%) scale(1);
        opacity: .72;
      }

      100% {
        transform: translate(-14%, -20%) scale(1.08);
        opacity: .95;
      }
    }

    @keyframes boot-sweep-fill {
      0% {
        stroke-dasharray: 0 100;
      }

      100% {
        stroke-dasharray: 100 0;
      }
    }

    html {
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      background-color: #f3f3f3;
      -webkit-touch-action: pan-x pan-y;
      touch-action: pan-x pan-y;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #141414;
      }

      .boot-splash__progress .progress-mid,
      .boot-splash__progress .progress {
        stroke: url(#boot-splash-white-fade);
      }

      #boot-splash {
        color: #f2f4fa;
        background: #141414;
      }

      #boot-splash::before {
        background: radial-gradient(circle, #3a4f9a88 0%, #5b3fd644 36%, transparent 70%);
      }

      .boot-splash__name {
        background: linear-gradient(90deg, #8a96b0 0%, #8ea0ff 45%, #b59cff 100%);
        -webkit-background-clip: text;
        background-clip: text;
      }

      #key rect {
        fill: #ffffff8f !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {}
  </style>
</head>

<body>
  <div id="boot-splash" role="status" aria-label="正在加载 LinKey">
    <div class="boot-splash__content">
      <div class="boot-splash__mark">
        <svg id="key" data-name="linkey" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
          <rect y="598.39" width="198.54" height="198.54" rx="20" ry="20" style="fill: #ffffff54;" />
          <rect y="361.55" width="198.54" height="198.54" rx="20" ry="20" style="fill: #ffffff54;" />
          <rect x="232.45" y="361.55" width="198.54" height="198.54" rx="20" ry="20" style="fill: #ffffff54;" />
          <rect y="124.71" width="198.54" height="198.54" rx="20" ry="20" style="fill: #ffffff54;" />
          <rect x="287.39" y="25.44" width="198.54" height="198.54" rx="20" ry="20"
            transform="translate(115.11 426.9) rotate(-65.93)" style="fill: #ffffff54;" />
          <rect x="586.13" y="15.23" width="198.54" height="198.54" rx="20" ry="20"
            transform="translate(425.84 759.1) rotate(-77.55)" style="fill: #ffffff54;" />
          <rect x="558.34" y="306.82" width="198.54" height="198.54" rx="20" ry="20"
            transform="translate(-68.42 141.07) rotate(-11.64)" style="fill: #ffffff54;" />
          <rect x="232.45" y="598.39" width="198.54" height="198.54" rx="20" ry="20" style="fill: #ffffff54;" />
          <rect x="463.44" y="598.39" width="198.54" height="198.54" rx="20" ry="20" style="fill: #ffffff54;" />
        </svg>
        <svg class="boot-splash__progress" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="boot-splash-white-fade" gradientUnits="userSpaceOnUse" x1="1.5" y1="1.5" x2="62.5"
              y2="62.5">
              <stop offset="0%" stop-color="#fff" stop-opacity=".5" />
              <stop offset="100%" stop-color="#fff" stop-opacity=".4" />
            </linearGradient>
          </defs>
          <path class="progress-mid"
            d="M32 1.5H48A14.5 14.5 0 0 1 62.5 16V48A14.5 14.5 0 0 1 48 62.5H16A14.5 14.5 0 0 1 1.5 48V16A14.5 14.5 0 0 1 16 1.5H32Z"
            pathLength="100" />
          <path class="progress"
            d="M32 1.5H48A14.5 14.5 0 0 1 62.5 16V48A14.5 14.5 0 0 1 48 62.5H16A14.5 14.5 0 0 1 1.5 48V16A14.5 14.5 0 0 1 16 1.5H32Z"
            pathLength="100" />
        </svg>
      </div>
      <div class="boot-splash__name">LINKEY · STORE</div>
    </div>
  </div>
  <script>
    (function () {
      const bootSplash = document.getElementById("boot-splash");
      window.linkeyBootStartedAt = performance.now();
      if (!bootSplash) return;
      window.linkeyBootSplashTimer = window.setTimeout(function () {
        bootSplash.classList.add("boot-splash--visible");
        void bootSplash.offsetWidth;
        bootSplash.classList.add("boot-splash--loading");
        window.linkeyBootSweepAt = performance.now();
      }, 200);
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/splash.js"></script>
</body>

</html>
